name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pipx install uv
      - name: Sync
        run: uv sync
      - name: Compile (smoke)
        run: uv run python -m compileall -q src
      - name: Pytest smoke
        run: uv run pytest -q tests/smoke
